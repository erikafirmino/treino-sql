<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Banca — Treino de SQL</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

:root{
  --bg: #10171A;
  --surface: #1A2327;
  --surface-2: #212C31;
  --line: #2C393F;
  --amber: #E8A23D;
  --amber-dim: #B87F30;
  --teal: #5FB3A0;
  --coral: #E0705E;
  --violet: #9C8CD9;
  --text: #EDEAE2;
  --muted: #869097;
  --font-display: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*{ box-sizing: border-box; margin:0; padding:0; }
html,body{ background: var(--bg); color: var(--text); font-family: var(--font-display); -webkit-tap-highlight-color: transparent; }
body{ padding-bottom: 48px; }

/* ---------- Header / signature ER diagram ---------- */
.hero{
  padding: 22px 18px 14px;
  border-bottom: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.hero-top{ display:flex; align-items:center; justify-content: space-between; gap: 8px; }
.hero-eyebrow{
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--amber);
  text-transform: uppercase;
}
.switch-track{
  font-family: var(--font-mono); font-size: 11px; color: var(--muted);
  background: var(--surface-2); border: 1px solid var(--line); border-radius: 999px;
  padding: 5px 10px; cursor: pointer;
}
.hero h1{
  font-size: 22px;
  font-weight: 700;
  margin-top: 4px;
  letter-spacing: -0.01em;
}
.hero p{
  color: var(--muted);
  font-size: 13px;
  margin-top: 6px;
  line-height: 1.5;
  max-width: 46ch;
}
#erSvg{ width: 100%; height: auto; margin-top: 14px; display:block; }
.er-table rect{ fill: var(--surface-2); stroke: var(--line); stroke-width: 1; }
.er-table text{ font-family: var(--font-mono); fill: var(--text); }
.er-table .tname{ font-weight: 700; fill: var(--amber); font-size: 10px; }
.er-table .fname{ font-size: 8.5px; fill: var(--muted); }
.er-link{ stroke: var(--amber-dim); stroke-width: 1; stroke-dasharray: 3 3; opacity: 0.7; }
.er-pulse{ animation: erpulse 2.6s ease-in-out infinite; }
@keyframes erpulse{ 0%,100%{ opacity:.35 } 50%{ opacity:.9 } }

/* ---------- Track select ---------- */
.track-select{ padding: 18px 14px 4px; }
.track-card{
  background: var(--surface); border: 1px solid var(--line); border-radius: 12px;
  padding: 16px; margin-bottom: 12px; display:flex; gap: 12px; align-items:flex-start;
  cursor: pointer;
}
.track-card:active{ border-color: var(--amber-dim); }
.track-emoji{ font-size: 26px; line-height:1; }
.track-info h3{ font-size: 15.5px; font-weight: 700; }
.track-info p{ color: var(--muted); font-size: 12.5px; margin-top: 4px; line-height: 1.5; }
.track-meta{ font-family: var(--font-mono); font-size: 10.5px; color: var(--teal); margin-top: 6px; }

/* ---------- Progress bar ---------- */
.progress-wrap{ padding: 12px 18px 0; }
.progress-track{ height: 5px; background: var(--surface-2); border-radius: 3px; overflow:hidden; }
.progress-fill{ height:100%; background: linear-gradient(90deg, var(--amber-dim), var(--amber)); transition: width .4s ease; border-radius: 3px; }
.progress-label{ font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; display:flex; justify-content: space-between; }

.infinite-row{ padding: 10px 14px 0; display:flex; }
.infinite-btn{
  font-family: var(--font-mono); font-size: 12px; color: var(--muted);
  background: var(--surface); border: 1px solid var(--line); border-radius: 999px;
  padding: 7px 12px; display:flex; align-items:center; gap:6px;
}
.infinite-btn.on{ color: var(--violet); border-color: var(--violet); background: rgba(156,140,217,0.1); }

/* ---------- Exercise card ---------- */
.card{
  margin: 16px 14px 0;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 16px 18px;
}
.ex-tag{
  display:inline-block;
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: .06em;
  color: var(--bg);
  background: var(--amber);
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 700;
  margin-bottom: 10px;
}
.ex-title{ font-size: 16px; font-weight: 600; line-height: 1.4; }
.ex-desc{ color: var(--muted); font-size: 13px; margin-top: 6px; line-height: 1.55; }
.hint-toggle{
  margin-top: 10px;
  background: none; border: none; color: var(--teal);
  font-family: var(--font-mono); font-size: 12px; cursor: pointer; padding: 0;
}
.hint-box{
  display:none;
  margin-top: 8px;
  font-size: 12.5px;
  color: var(--text);
  background: var(--surface-2);
  border-left: 2px solid var(--teal);
  padding: 8px 10px;
  border-radius: 4px;
  font-family: var(--font-mono);
  line-height: 1.5;
}
.hint-box.show{ display:block; }

/* ---------- Editor ---------- */
.editor-wrap{ margin-top: 14px; }
.editor-label{ font-family: var(--font-mono); font-size: 10.5px; color: var(--muted); letter-spacing:.08em; margin-bottom: 6px; text-transform: uppercase;}
textarea#sqlInput{
  width: 100%;
  min-height: 92px;
  background: #0D1315;
  color: var(--amber);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px 12px;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
  resize: vertical;
  outline: none;
}
textarea#sqlInput:focus{ border-color: var(--amber-dim); }

.btn-row{ display:flex; gap:8px; margin-top: 10px; }
button{ font-family: var(--font-display); cursor: pointer; border: none; }
.btn-run{
  flex:1;
  background: var(--amber);
  color: #1A1204;
  font-weight: 700;
  font-size: 14px;
  padding: 11px;
  border-radius: 8px;
}
.btn-run:active{ background: var(--amber-dim); }
.btn-reset{
  background: var(--surface-2);
  color: var(--muted);
  font-size: 13px;
  padding: 11px 14px;
  border-radius: 8px;
  border: 1px solid var(--line);
}

/* ---------- Result ---------- */
.result-wrap{ margin-top: 14px; }
.result-status{
  font-family: var(--font-mono);
  font-size: 12.5px;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 8px;
  line-height: 1.5;
}
.result-status.ok{ background: rgba(95,179,160,0.12); color: var(--teal); border: 1px solid rgba(95,179,160,0.3); }
.result-status.err{ background: rgba(224,112,94,0.12); color: var(--coral); border: 1px solid rgba(224,112,94,0.3); }
.result-status.neutral{ background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); }

.table-scroll{ overflow-x: auto; border: 1px solid var(--line); border-radius: 8px; }
table.result-table{ border-collapse: collapse; width: 100%; font-family: var(--font-mono); font-size: 12px; }
table.result-table th{
  background: var(--surface-2); color: var(--amber); text-align:left;
  padding: 7px 10px; white-space: nowrap; border-bottom: 1px solid var(--line);
}
table.result-table td{ padding: 7px 10px; white-space: nowrap; border-bottom: 1px solid var(--line); color: var(--text); }
table.result-table tr:last-child td{ border-bottom: none; }

/* ---------- Nav ---------- */
.nav-row{ display:flex; gap:8px; margin: 16px 14px 0; }
.nav-btn{
  flex:1; background: var(--surface); border: 1px solid var(--line); color: var(--text);
  padding: 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
}
.nav-btn:disabled{ opacity: .35; }
.nav-btn.primary{ background: var(--teal); color: #0C1F1A; border-color: var(--teal); }

/* ---------- Schema reference ---------- */
.schema-toggle{
  margin: 16px 14px 0; width: calc(100% - 28px);
  background: var(--surface); border: 1px solid var(--line); color: var(--muted);
  padding: 10px; border-radius: 8px; font-family: var(--font-mono); font-size: 12px;
  display:flex; justify-content: space-between; align-items:center;
}
.schema-body{ display:none; margin: 8px 14px 0; }
.schema-body.show{ display:block; }
.schema-table{ background: var(--surface); border:1px solid var(--line); border-radius:8px; padding: 10px 12px; margin-bottom: 8px; }
.schema-table h4{ font-family: var(--font-mono); color: var(--amber); font-size: 12.5px; margin-bottom: 4px; }
.schema-table div{ font-family: var(--font-mono); font-size: 11.5px; color: var(--muted); line-height: 1.6; }

/* ---------- Done state ---------- */
.done-banner{
  margin: 16px 14px 0; padding: 20px 16px; text-align:center;
  background: linear-gradient(160deg, var(--surface), var(--surface-2));
  border: 1px solid var(--teal); border-radius: 10px;
}
.done-banner .big{ font-size: 28px; }
.done-banner p{ color: var(--muted); font-size: 13px; margin-top: 6px; }
.done-banner .btn-run{ margin-top: 14px; }

.loading-note{ padding: 40px 18px; text-align:center; color: var(--muted); font-family: var(--font-mono); font-size: 13px; }
.hidden{ display:none !important; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-top">
    <div>
      <div class="hero-eyebrow" id="heroEyebrow">Banca de treino</div>
      <h1 id="heroTitle">Treino de SQL</h1>
    </div>
    <button class="switch-track hidden" id="switchTrackBtn">↩ trocar trilha</button>
  </div>
  <p id="heroDesc">Um banco SQLite de verdade, rodando no seu celular. Escolha uma trilha para começar.</p>
  <svg id="erSvg" viewBox="0 0 340 130" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<div class="track-select" id="trackSelect"></div>

<div class="progress-wrap hidden" id="progressWrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label"><span id="progressText">Exercício 1 de 10</span><span id="progressPct">0%</span></div>
</div>
<div class="infinite-row hidden" id="infiniteRow">
  <button class="infinite-btn" id="infiniteBtn">🔀 modo infinito: desligado</button>
</div>

<button class="schema-toggle hidden" id="schemaToggle">
  <span>📐 Ver estrutura das tabelas</span><span id="schemaArrow">▾</span>
</button>
<div class="schema-body" id="schemaBody"></div>

<div id="app"></div>

<div class="nav-row hidden" id="navRow">
  <button class="nav-btn" id="prevBtn">← anterior</button>
  <button class="nav-btn primary" id="nextBtn">próximo →</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<script>
/* ============================================================
   TRILHA 1 — BIBLIOTECA MUNICIPAL
   ============================================================ */
const BIBLIOTECA_SCHEMA = `
CREATE TABLE autores (
  id INTEGER PRIMARY KEY,
  nome TEXT,
  nacionalidade TEXT
);
CREATE TABLE livros (
  id INTEGER PRIMARY KEY,
  titulo TEXT,
  autor_id INTEGER,
  ano INTEGER,
  genero TEXT,
  disponivel INTEGER
);
CREATE TABLE usuarios (
  id INTEGER PRIMARY KEY,
  nome TEXT,
  cidade TEXT
);
CREATE TABLE emprestimos (
  id INTEGER PRIMARY KEY,
  livro_id INTEGER,
  usuario_id INTEGER,
  data_emprestimo TEXT,
  data_devolucao TEXT
);

INSERT INTO autores VALUES
 (1,'Machado de Assis','Brasil'),
 (2,'Clarice Lispector','Brasil'),
 (3,'Jorge Amado','Brasil'),
 (4,'Gabriel García Márquez','Colômbia'),
 (5,'Isabel Allende','Chile'),
 (6,'José Saramago','Portugal');

INSERT INTO livros VALUES
 (1,'Dom Casmurro',1,1899,'Romance',1),
 (2,'Memórias Póstumas de Brás Cubas',1,1881,'Romance',1),
 (3,'A Hora da Estrela',2,1977,'Romance',0),
 (4,'Perto do Coração Selvagem',2,1943,'Romance',1),
 (5,'Gabriela, Cravo e Canela',3,1958,'Romance',1),
 (6,'Capitães da Areia',3,1937,'Romance',0),
 (7,'Cem Anos de Solidão',4,1967,'Realismo Mágico',1),
 (8,'O Amor nos Tempos do Cólera',4,1985,'Romance',1),
 (9,'A Casa dos Espíritos',5,1982,'Realismo Mágico',0),
 (10,'Ensaio sobre a Cegueira',6,1995,'Ficção',1),
 (11,'O Evangelho Segundo Jesus Cristo',6,1991,'Ficção',1);

INSERT INTO usuarios VALUES
 (1,'Fernanda Lima','Fortaleza'),
 (2,'Bruno Alves','Fortaleza'),
 (3,'Carla Dias','Sobral'),
 (4,'Diego Rocha','Juazeiro do Norte'),
 (5,'Elisa Nunes','Fortaleza');

INSERT INTO emprestimos VALUES
 (1,3,1,'2026-05-02',NULL),
 (2,6,2,'2026-05-10',NULL),
 (3,9,3,'2026-05-15',NULL),
 (4,1,1,'2026-04-01','2026-04-20'),
 (5,7,4,'2026-04-18','2026-05-01'),
 (6,5,5,'2026-06-01',NULL),
 (7,2,2,'2026-03-11','2026-03-25');
`;

const BIBLIOTECA_EXERCISES = [
  { tag:'SELECT básico', title:'Liste todos os livros',
    desc:'Mostre o título e o ano de todos os livros da tabela livros.',
    hint:'SELECT titulo, ano FROM livros;',
    expected:`SELECT titulo, ano FROM livros;` },
  { tag:'WHERE', title:'Livros disponíveis',
    desc:'Liste o título dos livros que estão disponíveis (disponivel = 1) para empréstimo.',
    hint:'Use WHERE disponivel = 1',
    expected:`SELECT titulo FROM livros WHERE disponivel = 1;` },
  { tag:'WHERE + comparação', title:'Clássicos do século XIX',
    desc:'Liste título e ano dos livros publicados antes de 1900.',
    hint:'Use WHERE ano < 1900',
    expected:`SELECT titulo, ano FROM livros WHERE ano < 1900;` },
  { tag:'ORDER BY', title:'Do mais novo para o mais antigo',
    desc:'Liste título e ano de todos os livros, ordenados do mais recente para o mais antigo.',
    hint:'ORDER BY ano DESC',
    expected:`SELECT titulo, ano FROM livros ORDER BY ano DESC;` },
  { tag:'COUNT', title:'Quantos livros existem?',
    desc:'Conte o número total de livros no acervo. Chame a coluna resultante de total.',
    hint:'SELECT COUNT(*) AS total FROM livros;',
    expected:`SELECT COUNT(*) AS total FROM livros;` },
  { tag:'GROUP BY', title:'Livros por gênero',
    desc:'Conte quantos livros existem em cada gênero. Mostre genero e a quantidade (chame de qtd), ordenado do gênero com mais livros para o com menos.',
    hint:'GROUP BY genero ... ORDER BY qtd DESC',
    expected:`SELECT genero, COUNT(*) AS qtd FROM livros GROUP BY genero ORDER BY qtd DESC;` },
  { tag:'JOIN', title:'Livro com nome do autor',
    desc:'Liste o título de cada livro junto com o nome do autor correspondente (junte livros e autores).',
    hint:'JOIN autores ON livros.autor_id = autores.id',
    expected:`SELECT livros.titulo, autores.nome FROM livros JOIN autores ON livros.autor_id = autores.id;` },
  { tag:'JOIN + WHERE', title:'Autores brasileiros',
    desc:'Liste o título dos livros escritos por autores brasileiros (nacionalidade = "Brasil").',
    hint:"Faça o JOIN e filtre por autores.nacionalidade = 'Brasil'",
    expected:`SELECT livros.titulo FROM livros JOIN autores ON livros.autor_id = autores.id WHERE autores.nacionalidade = 'Brasil';` },
  { tag:'JOIN triplo', title:'Quem está com o livro emprestado?',
    desc:'Liste o título do livro e o nome do usuário para todos os empréstimos que ainda não foram devolvidos (data_devolucao é NULL).',
    hint:'Junte emprestimos com livros e usuarios; filtre WHERE data_devolucao IS NULL',
    expected:`SELECT livros.titulo, usuarios.nome FROM emprestimos JOIN livros ON emprestimos.livro_id = livros.id JOIN usuarios ON emprestimos.usuario_id = usuarios.id WHERE emprestimos.data_devolucao IS NULL;` },
  { tag:'Subconsulta', title:'Autores sem nenhum livro emprestado',
    desc:'Liste o nome dos autores cujos livros nunca aparecem na tabela emprestimos.',
    hint:'Use NOT IN com uma subconsulta que busca autor_id dos livros que foram emprestados',
    expected:`SELECT nome FROM autores WHERE id NOT IN (SELECT autor_id FROM livros WHERE id IN (SELECT livro_id FROM emprestimos));` },
  { tag:'LEFT JOIN', title:'Livros que nunca foram emprestados',
    desc:'Liste o título dos livros que nunca aparecem na tabela emprestimos, usando LEFT JOIN em vez de subconsulta.',
    hint:'LEFT JOIN emprestimos ... WHERE emprestimos.id IS NULL',
    expected:`SELECT livros.titulo FROM livros LEFT JOIN emprestimos ON livros.id = emprestimos.livro_id WHERE emprestimos.id IS NULL;` },
  { tag:'HAVING', title:'Autores com mais de um livro',
    desc:'Liste o nome dos autores que têm mais de 1 livro no acervo, junto com a quantidade (chame de qtd).',
    hint:'GROUP BY autores.nome ... HAVING COUNT(*) > 1',
    expected:`SELECT autores.nome, COUNT(*) AS qtd FROM livros JOIN autores ON livros.autor_id = autores.id GROUP BY autores.nome HAVING COUNT(*) > 1;` },
  { tag:'Datas', title:'Empréstimos de maio de 2026',
    desc:'Liste todos os empréstimos (todas as colunas) cuja data_emprestimo é de maio de 2026.',
    hint:"Use WHERE data_emprestimo LIKE '2026-05%'",
    expected:`SELECT * FROM emprestimos WHERE data_emprestimo LIKE '2026-05%';` },
  { tag:'CASE WHEN', title:'Status legível do livro',
    desc:'Liste o título de cada livro junto com uma coluna status: "Disponível" se disponivel = 1, senão "Emprestado".',
    hint:"CASE WHEN disponivel = 1 THEN 'Disponível' ELSE 'Emprestado' END AS status",
    expected:`SELECT titulo, CASE WHEN disponivel = 1 THEN 'Disponível' ELSE 'Emprestado' END AS status FROM livros;` },
  { tag:'Subconsulta correlacionada', title:'O livro mais recente de cada autor',
    desc:'Liste título e ano apenas dos livros que são o mais recente (maior ano) do respectivo autor.',
    hint:'WHERE ano = (SELECT MAX(ano) FROM livros l2 WHERE l2.autor_id = livros.autor_id) — dê um apelido (alias) à tabela externa',
    expected:`SELECT titulo, ano FROM livros l1 WHERE ano = (SELECT MAX(ano) FROM livros l2 WHERE l2.autor_id = l1.autor_id);` },
];

const BIBLIOTECA_SCHEMA_REF = [
  { name:'autores', cols:['id (PK)','nome','nacionalidade'] },
  { name:'livros', cols:['id (PK)','titulo','autor_id (FK → autores.id)','ano','genero','disponivel (0/1)'] },
  { name:'usuarios', cols:['id (PK)','nome','cidade'] },
  { name:'emprestimos', cols:['id (PK)','livro_id (FK → livros.id)','usuario_id (FK → usuarios.id)','data_emprestimo','data_devolucao'] }
];

/* ============================================================
   TRILHA 2 — LOJA ONLINE
   ============================================================ */
const LOJA_SCHEMA = `

const LOJA_EXERCISES = [
  { tag:'SELECT básico', title:'Liste todos os produtos',
    desc:'Mostre o nome e o preço de todos os produtos.',
    hint:'SELECT nome, preco FROM produtos;',
    expected:`SELECT nome, preco FROM produtos;` },
  { tag:'WHERE', title:'Produtos acima de R$150',
    desc:'Liste o nome dos produtos com preço maior que 150.',
    hint:'Use WHERE preco > 150',
    expected:`SELECT nome FROM produtos WHERE preco > 150;` },
  { tag:'WHERE + comparação', title:'Só eletrônicos',
    desc:'Liste nome e categoria dos produtos da categoria "Eletrônicos".',
    hint:"WHERE categoria = 'Eletrônicos'",
    expected:`SELECT nome, categoria FROM produtos WHERE categoria = 'Eletrônicos';` },
  { tag:'ORDER BY', title:'Do mais caro pro mais barato',
    desc:'Liste nome e preço de todos os produtos, ordenados do mais caro para o mais barato.',
    hint:'ORDER BY preco DESC',
    expected:`SELECT nome, preco FROM produtos ORDER BY preco DESC;` },
  { tag:'COUNT', title:'Quantos produtos existem?',
    desc:'Conte o número total de produtos no catálogo. Chame a coluna de total.',
    hint:'SELECT COUNT(*) AS total FROM produtos;',
    expected:`SELECT COUNT(*) AS total FROM produtos;` },
  { tag:'GROUP BY', title:'Produtos por categoria',
    desc:'Conte quantos produtos existem em cada categoria. Mostre categoria e a quantidade (chame de qtd), da maior para a menor.',
    hint:'GROUP BY categoria ... ORDER BY qtd DESC',
    expected:`SELECT categoria, COUNT(*) AS qtd FROM produtos GROUP BY categoria ORDER BY qtd DESC;` },
  { tag:'JOIN', title:'Pedido com nome do cliente',
    desc:'Liste o id do pedido e o nome do cliente que fez cada pedido.',
    hint:'JOIN clientes ON pedidos.cliente_id = clientes.id',
    expected:`SELECT pedidos.id, clientes.nome FROM pedidos JOIN clientes ON pedidos.cliente_id = clientes.id;` },
  { tag:'JOIN + WHERE', title:'Pedidos de clientes do Recife',
    desc:'Liste o id dos pedidos feitos por clientes da cidade "Recife".',
    hint:"Faça o JOIN e filtre por clientes.cidade = 'Recife'",
    expected:`SELECT pedidos.id FROM pedidos JOIN clientes ON pedidos.cliente_id = clientes.id WHERE clientes.cidade = 'Recife';` },
  { tag:'JOIN triplo', title:'Itens de pedidos pendentes',
    desc:'Liste o nome do produto e a quantidade para todos os itens de pedidos com status "pendente".',
    hint:'Junte itens_pedido com produtos e pedidos; filtre WHERE pedidos.status = \'pendente\'',
    expected:`SELECT produtos.nome, itens_pedido.quantidade FROM itens_pedido JOIN produtos ON itens_pedido.produto_id = produtos.id JOIN pedidos ON itens_pedido.pedido_id = pedidos.id WHERE pedidos.status = 'pendente';` },
  { tag:'Subconsulta', title:'Clientes que nunca compraram',
    desc:'Liste o nome dos clientes que nunca fizeram nenhum pedido.',
    hint:'Use NOT IN com uma subconsulta que busca cliente_id em pedidos',
    expected:`SELECT nome FROM clientes WHERE id NOT IN (SELECT cliente_id FROM pedidos);` },
  { tag:'LEFT JOIN', title:'Produtos nunca vendidos',
    desc:'Liste o nome dos produtos que nunca apareceram em nenhum item de pedido, usando LEFT JOIN.',
    hint:'LEFT JOIN itens_pedido ... WHERE itens_pedido.id IS NULL',
    expected:`SELECT produtos.nome FROM produtos LEFT JOIN itens_pedido ON produtos.id = itens_pedido.produto_id WHERE itens_pedido.id IS NULL;` },
  { tag:'HAVING', title:'Clientes com mais de um pedido',
    desc:'Liste o nome dos clientes que fizeram mais de 1 pedido, junto com a quantidade (chame de qtd).',
    hint:'GROUP BY clientes.nome ... HAVING COUNT(*) > 1',
    expected:`SELECT clientes.nome, COUNT(*) AS qtd FROM pedidos JOIN clientes ON pedidos.cliente_id = clientes.id GROUP BY clientes.nome HAVING COUNT(*) > 1;` },
  { tag:'Datas', title:'Pedidos de maio de 2026',
    desc:'Liste todos os pedidos (todas as colunas) cuja data_pedido é de maio de 2026.',
    hint:"Use WHERE data_pedido LIKE '2026-05%'",
    expected:`SELECT * FROM pedidos WHERE data_pedido LIKE '2026-05%';` },
  { tag:'CASE WHEN', title:'Faixa de preço',
    desc:'Liste o nome de cada produto junto com uma coluna faixa: "Caro" se preco >= 200, senão "Acessível".',
    hint:"CASE WHEN preco >= 200 THEN 'Caro' ELSE 'Acessível' END AS faixa",
    expected:`SELECT nome, CASE WHEN preco >= 200 THEN 'Caro' ELSE 'Acessível' END AS faixa FROM produtos;` },
  { tag:'Subconsulta correlacionada', title:'O produto mais caro de cada categoria',
    desc:'Liste nome, categoria e preço apenas dos produtos que têm o maior preço da respectiva categoria.',
    hint:'WHERE preco = (SELECT MAX(preco) FROM produtos p2 WHERE p2.categoria = produtos.categoria) — dê um apelido à tabela externa',
    expected:`SELECT nome, categoria, preco FROM produtos p1 WHERE preco = (SELECT MAX(preco) FROM produtos p2 WHERE p2.categoria = p1.categoria);` },
];

];

  biblioteca: {

/* ============================================================
   STATE
   ============================================================ */
let db = null;
let currentTrackKey = null;
let exerciseOrder = [];
let current = 0;
let infiniteMode = false;
let round = 1;
let solvedByTrack = {};

/* ============================================================
   HELPERS
   ============================================================ */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function normalizeRows(res){
  if(!res || !res.length) return { columns: [], values: [] };
  return { columns: res[0].columns, values: res[0].values };
}
function rowsEqual(a, b){
  if(a.values.length !== b.values.length) return false;
  const norm = (rows) => rows.map(r => r.map(v => v===null?'∅':String(v)).join('|')).sort();
  const na = norm(a.values), nb = norm(b.values);
  for(let i=0;i<na.length;i++){ if(na[i] !== nb[i]) return false; }
  return true;
}
function renderTable(res){
  if(!res.columns.length){
    return '<div class="result-status neutral">Consulta executada — nenhuma linha retornada.</div>';
  }
  let html = '<div class="table-scroll"><table class="result-table"><thead><tr>';
  res.columns.forEach(c => html += `<th>${c}</th>`);
  html += '</tr></thead><tbody>';
  res.values.slice(0,50).forEach(row => {
    html += '<tr>' + row.map(v => `<td>${v===null?'<span style="color:var(--muted)">null</span>':v}</td>`).join('') + '</tr>';
  });
  html += '</tbody></table></div>';
  if(res.values.length > 50) html += `<div class="result-status neutral" style="margin-top:8px;">mostrando 50 de ${res.values.length} linhas</div>`;
  return html;
}

/* ============================================================
   TRACK SELECT SCREEN
   ============================================================ */
function showTrackSelect(){
  currentTrackKey = null;
  document.getElementById('heroEyebrow').textContent = 'Banca de treino';
  document.getElementById('heroTitle').textContent = 'Treino de SQL';
  document.getElementById('heroDesc').textContent = 'Um banco SQLite de verdade, rodando no seu celular. Escolha uma trilha para começar.';
  document.getElementById('switchTrackBtn').classList.add('hidden');
  document.getElementById('progressWrap').classList.add('hidden');
  document.getElementById('infiniteRow').classList.add('hidden');
  document.getElementById('schemaToggle').classList.add('hidden');
  document.getElementById('schemaBody').classList.remove('show');
  document.getElementById('navRow').classList.add('hidden');
  document.getElementById('erSvg').innerHTML = '';
  document.getElementById('app').innerHTML = '';

  const sel = document.getElementById('trackSelect');
  sel.innerHTML = Object.values(TRACKS).map(t => {
    const done = solvedByTrack[t.key] ? solvedByTrack[t.key].filter(Boolean).length : 0;
    return `
    <div class="track-card" data-key="${t.key}">
      <div class="track-emoji">${t.emoji}</div>
      <div class="track-info">
        <h3>${t.label}</h3>
        <p>${t.tagline}</p>
        <div class="track-meta">${t.exercises.length} exercícios ${done ? '· ' + done + ' resolvidos' : ''}</div>
      </div>
    </div>`;
  }).join('');
  sel.querySelectorAll('.track-card').forEach(card => {
    card.onclick = () => selectTrack(card.dataset.key);
  });
}

function selectTrack(key){
  currentTrackKey = key;
  const t = TRACKS[key];

  document.getElementById('trackSelect').innerHTML = '';
  document.getElementById('heroEyebrow').textContent = t.eyebrow;
  document.getElementById('heroTitle').textContent = t.title;
  document.getElementById('heroDesc').textContent = t.desc;
  document.getElementById('switchTrackBtn').classList.remove('hidden');
  document.getElementById('progressWrap').classList.remove('hidden');
  document.getElementById('infiniteRow').classList.remove('hidden');
  document.getElementById('schemaToggle').classList.remove('hidden');

  db = new SQL.Database();
  db.run(t.schemaSql);

  if(!solvedByTrack[key]) solvedByTrack[key] = new Array(t.exercises.length).fill(false);
  exerciseOrder = t.exercises.map((_,i) => i);
  current = 0;
  infiniteMode = false;
  round = 1;
  document.getElementById('infiniteBtn').textContent = '🔀 modo infinito: desligado';
  document.getElementById('infiniteBtn').classList.remove('on');

  renderSchemaRef(t.schemaRef);
  renderERDiagram(t.er());
  document.getElementById('navRow').classList.remove('hidden');
  renderExercise();
}

/* ============================================================
   EXERCISE FLOW
   ============================================================ */
function renderExercise(){
  const t = TRACKS[currentTrackKey];
  const exIndex = exerciseOrder[current];
  const ex = t.exercises[exIndex];
  const solved = solvedByTrack[currentTrackKey];

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="card">
      <span class="ex-tag">${ex.tag}${solved[exIndex] ? ' · resolvido ✓' : ''}</span>
      <div class="ex-title">${ex.title}</div>
      <div class="ex-desc">${ex.desc}</div>
      <button class="hint-toggle" id="hintToggle">💡 mostrar dica</button>
      <div class="hint-box" id="hintBox">${ex.hint}</div>

      <div class="editor-wrap">
        <div class="editor-label">Sua consulta</div>
        <textarea id="sqlInput" spellcheck="false" placeholder="SELECT ...">${solved[exIndex] ? ex.expected : ''}</textarea>
      </div>
      <div class="btn-row">
        <button class="btn-run" id="runBtn">▶ Executar</button>
        <button class="btn-reset" id="clearBtn">limpar</button>
      </div>
      <div class="result-wrap" id="resultWrap"></div>
    </div>
  `;

  document.getElementById('hintToggle').onclick = () => {
    document.getElementById('hintBox').classList.toggle('show');
  };
  document.getElementById('clearBtn').onclick = () => {
    document.getElementById('sqlInput').value = '';
  };
  document.getElementById('runBtn').onclick = runQuery;

  updateProgress();
  updateNav();
}

function runQuery(){
  const t = TRACKS[currentTrackKey];
  const exIndex = exerciseOrder[current];
  const ex = t.exercises[exIndex];
  const input = document.getElementById('sqlInput').value.trim();
  const wrap = document.getElementById('resultWrap');
  if(!input){
    wrap.innerHTML = '<div class="result-status err">Escreva uma consulta antes de executar.</div>';
    return;
  }
  try{
    const userRes = normalizeRows(db.exec(input));
    const expectedRes = normalizeRows(db.exec(ex.expected));
    const correct = rowsEqual(userRes, expectedRes);
    let statusHtml;
    if(correct){
      solvedByTrack[currentTrackKey][exIndex] = true;
      statusHtml = '<div class="result-status ok">✓ Correto! Resultado bate com o esperado.</div>';
    } else {
      statusHtml = '<div class="result-status err">✗ A consulta rodou, mas o resultado é diferente do esperado. Tente de novo.</div>';
    }
    wrap.innerHTML = statusHtml + renderTable(userRes);
    updateProgress();
    updateNav();
  } catch(e){
    wrap.innerHTML = `<div class="result-status err">Erro de SQL: ${e.message}</div>`;
  }
}

function updateProgress(){
  const t = TRACKS[currentTrackKey];
  const solved = solvedByTrack[currentTrackKey];
  const done = solved.filter(Boolean).length;
  const pct = Math.round((done/t.exercises.length)*100);
  document.getElementById('progressFill').style.width = pct + '%';
  if(infiniteMode){
    document.getElementById('progressText').textContent = `Rodada ${round} · exercício ${current+1} de ${exerciseOrder.length}`;
  } else {
    document.getElementById('progressText').textContent = `Exercício ${current+1} de ${t.exercises.length}`;
  }
  document.getElementById('progressPct').textContent = `${done}/${t.exercises.length} resolvidos`;
}

function updateNav(){
  document.getElementById('prevBtn').disabled = current === 0;
  const nextBtn = document.getElementById('nextBtn');
  const t = TRACKS[currentTrackKey];
  const solved = solvedByTrack[currentTrackKey];
  if(infiniteMode){
    nextBtn.textContent = 'próximo →';
    nextBtn.disabled = false;
  } else if(current === exerciseOrder.length - 1){
    nextBtn.textContent = solved.every(Boolean) ? 'ver resumo →' : 'próximo →';
  } else {
    nextBtn.textContent = 'próximo →';
  }
}

document.getElementById('prevBtn').onclick = () => {
  if(current > 0){ current--; renderExercise(); }
};
document.getElementById('nextBtn').onclick = () => {
  const t = TRACKS[currentTrackKey];
  const solved = solvedByTrack[currentTrackKey];
  if(current < exerciseOrder.length - 1){
    current++; renderExercise();
  } else if(infiniteMode){
    exerciseOrder = shuffle(t.exercises.map((_,i)=>i));
    current = 0; round++;
    renderExercise();
  } else if(solved.every(Boolean)){
    renderDone();
  } else {
    current = exerciseOrder.findIndex((idx) => !solved[idx]);
    renderExercise();
  }
};

document.getElementById('infiniteBtn').onclick = () => {
  const t = TRACKS[currentTrackKey];
  infiniteMode = !infiniteMode;
  const btn = document.getElementById('infiniteBtn');
  if(infiniteMode){
    btn.textContent = '🔀 modo infinito: ligado';
    btn.classList.add('on');
    exerciseOrder = shuffle(t.exercises.map((_,i)=>i));
    current = 0; round = 1;
  } else {
    btn.textContent = '🔀 modo infinito: desligado';
    btn.classList.remove('on');
    exerciseOrder = t.exercises.map((_,i)=>i);
    current = 0;
  }
  renderExercise();
};

document.getElementById('switchTrackBtn').onclick = showTrackSelect;

function renderDone(){
  document.getElementById('app').innerHTML = `
    <div class="done-banner">
      <div class="big">🏁</div>
      <div class="ex-title" style="margin-top:6px;">Trilha concluída!</div>
      <p>Você resolveu os ${TRACKS[currentTrackKey].exercises.length} exercícios desta trilha. Que tal tentar a outra, ou ligar o modo infinito para continuar treinando?</p>
      <button class="btn-run" id="doneBackBtn">↩ escolher outra trilha</button>
    </div>
  `;
  document.getElementById('doneBackBtn').onclick = showTrackSelect;
}

/* ============================================================
   SCHEMA REFERENCE + ER DIAGRAM
   ============================================================ */
document.getElementById('schemaToggle').onclick = () => {
  const body = document.getElementById('schemaBody');
  const arrow = document.getElementById('schemaArrow');
  body.classList.toggle('show');
  arrow.textContent = body.classList.contains('show') ? '▴' : '▾';
};

function renderSchemaRef(tables){
  document.getElementById('schemaBody').innerHTML = tables.map(t => `
    <div class="schema-table">
      <h4>${t.name}</h4>
      <div>${t.cols.join('<br>')}</div>
    </div>
  `).join('');
}

function renderERDiagram({tables, links}){
  const w = 108, rowH = 12, headerH = 16;
  let svg = '';
  links.forEach(([x1,y1,x2,y2]) => {
    svg += `<line class="er-link er-pulse" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" />`;
  });
  tables.forEach(t => {
    const h = headerH + t.fields.length*rowH + 6;
    svg += `<g class="er-table" transform="translate(${t.x},${t.y})">
      <rect width="${w}" height="${h}" rx="5"/>
      <text x="8" y="13" class="tname">${t.name}</text>
      ${t.fields.map((f,i) => `<text x="8" y="${headerH + 9 + i*rowH}" class="fname">${f}</text>`).join('')}
    </g>`;
  });
  document.getElementById('erSvg').innerHTML = svg;
}

/* ============================================================
   INIT
   ============================================================ */
async function init(){
  document.getElementById('app').innerHTML = '<div class="loading-note">carregando motor SQLite…</div>';
  try{
    window.SQL = await initSqlJs({ locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${file}` });
    document.getElementById('app').innerHTML = '';
    showTrackSelect();
  } catch(e){
    document.getElementById('app').innerHTML = `<div class="loading-note">Não foi possível carregar o motor SQL: ${e.message}</div>`;
  }
}
init();
</script>
